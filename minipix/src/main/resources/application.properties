# Nome da aplicańŃo
spring.application.name=minipix

# ConexŃo PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/banco_contas
spring.datasource.username=postgres
spring.datasource.password=admin

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Auth0
# https://SEU_DOMAIN/
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-e1f1fksmoqce5au4.us.auth0.com/

auth0.audience=https://api-contas